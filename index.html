<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AutoBot IA – Starter</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Sora:wght@300;400;600&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>

<body>

  <div class="page-wrapper">

    <!-- Cabeçalho da marca -->
    <div class="brand-header">
      <div class="logo">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path
              d="M19 9.5A7.5 7.5 0 0 0 7.5 3.5C4.46 3.5 2 5.96 2 9v1c0 .55.45 1 1 1h.27c.58 2.44 2.63 4.27 5.23 4.47V17H7c-.55 0-1 .45-1 1v2h2v-1h4v1h2v-2c0-.55-.45-1-1-1h-1v-1.52c2.6-.2 4.65-2.03 5.23-4.47H19c.55 0 1-.45 1-1V9.5z" />
          </svg>
        </div>
        <h1>AutoBot IA</h1>
      </div>
      <p>Plano Starter · Atendimento inteligente 24/7</p>
    </div>

    <!-- Card principal do chat -->
    <div class="chat-card">

      <!-- Header do chat -->
      <div class="chat-header">
        <div class="avatar-pulse">
          <div class="avatar">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path
                d="M19 9.5A7.5 7.5 0 0 0 7.5 3.5C4.46 3.5 2 5.96 2 9v1c0 .55.45 1 1 1h.27c.58 2.44 2.63 4.27 5.23 4.47V17H7c-.55 0-1 .45-1 1v2h2v-1h4v1h2v-2c0-.55-.45-1-1-1h-1v-1.52c2.6-.2 4.65-2.03 5.23-4.47H19c.55 0 1-.45 1-1V9.5z" />
            </svg>
          </div>
          <div class="online-dot"></div>
        </div>
        <div class="header-info">
          <h2>Assistente Virtual</h2>
          <span>Online agora · Responde em segundos</span>
        </div>
        <div class="badge-starter">STARTER</div>
      </div>

      <!-- Área de mensagens -->
      <div class="messages-area" id="messagesArea" role="log" aria-live="polite"
        aria-label="Conversa com assistente virtual"></div>

      <!-- Área de input -->
      <div class="input-area">
        <input type="text" id="userInput" placeholder="Digite sua mensagem..." autocomplete="off"
          aria-label="Digite sua mensagem" />
        <button id="sendBtn" aria-label="Enviar mensagem">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z" />
          </svg>
        </button>
      </div>

    </div><!-- /chat-card -->

    <!-- Rodapé -->
    <div class="footer-note">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z" />
      </svg>
      Conversa segura · Powered by Groq AI
    </div>

  </div><!-- /page-wrapper -->

  <script src="js/script.js"></script>
</body>

</html>
